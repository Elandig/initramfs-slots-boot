name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  build-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Confirm it's actually static
        # musl release binaries report as "static-pie linked"; older toolchains say
        # "statically linked".
        run: file target/x86_64-unknown-linux-musl/release/slots-boot | grep -qE 'static-pie linked|statically linked'
      - uses: actions/upload-artifact@v4
        with:
          name: slots-boot-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/slots-boot

  docker-logic-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the container logic tests
        run: test/docker/run-tests.sh
